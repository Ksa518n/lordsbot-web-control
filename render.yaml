services:
  - type: web
    name: lordsbot-web
    env: docker
    plan: standard
    region: oregon
    healthCheckPath: /
    envVars:
      - key: RENDER_HEALTH_CHECK_TIMEOUT
        value: "300"
      - key: PORT
        value: 8080
      - key: RESOLUTION
        value: 1280x720
      - key: VNC_PASSWORD
        value: lordsbot
